<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIP 專屬抽獎池</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050505">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-primary: #d4af37;
            --gold-light: #fff3cd;
            --gold-dark: #aa771c;
            --accent-red: #ff2d55;
            --accent-blue: #007aff;
            --success-green: #34d399;
            --error-red: #f87171;
        }

        body {
            background: radial-gradient(circle at 50% 0%, #1a1a2e 0%, #050505 100%);
            color: #ffffff;
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            min-height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            padding: 20px 15px; margin: 0; overflow-x: hidden;
        }

        /* 提升對比度與字體大小 */
        .title-prestige {
            font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em;
            background: linear-gradient(to bottom, #ffffff 0%, var(--gold-light) 40%, var(--gold-primary) 70%, var(--gold-dark) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-align: center; font-size: clamp(2.5rem, 8vw, 3.8rem);
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.8));
            margin-bottom: 10px;
        }

        .event-time {
            color: var(--gold-primary); font-size: 14px; font-weight: 700; letter-spacing: 1px;
            background: rgba(212, 175, 55, 0.1); padding: 6px 16px; border-radius: 20px;
            display: inline-block; margin-bottom: 25px; border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .user-profile-card {
            background: rgba(255, 255, 255, 0.08); border: 1px solid var(--gold-dark);
            border-radius: 20px; padding: 15px 30px; display: flex; align-items: center; gap: 15px;
            margin-bottom: 25px; box-shadow: inset 0 0 15px rgba(212, 175, 55, 0.2); min-width: 280px; justify-content: center;
        }
        .level-badge { background: linear-gradient(135deg, var(--gold-light), var(--gold-dark)); color: #000; font-weight: 900; padding: 3px 10px; border-radius: 6px; font-size: 16px; }
        .status-badge { font-size: 13px; font-weight: 900; padding: 5px 12px; border-radius: 6px; margin-top: 10px; display: inline-block; }
        .status-loading { background: rgba(255,255,255,0.15); color: #ddd; }
        .status-eligible { background: rgba(52, 211, 153, 0.2); color: var(--success-green); border: 1px solid var(--success-green); }
        .status-ineligible { background: rgba(248, 113, 113, 0.2); color: var(--error-red); border: 1px solid var(--error-red); }
        .status-voted { background: rgba(212, 175, 55, 0.2); color: var(--gold-light); border: 1px solid var(--gold-primary); }

        .main-card { background: rgba(10, 10, 10, 0.98); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 40px; width: 100%; max-width: 620px; padding: clamp(25px, 6vw, 40px); box-shadow: 0 40px 100px rgba(0,0,0,1); }

        .legendary-inner { background: radial-gradient(circle at 50% 40%, rgba(212, 175, 55, 0.3) 0%, #0a0a0a 85%); border-radius: 38px; padding: 30px 20px; text-align: center; }
        .iphone-img { width: 120px; margin: 0 auto 15px auto; filter: drop-shadow(0 0 30px rgba(212,175,55,0.7)); }

        .progress-wrapper { position: relative; margin: 50px 0 30px 0; }
        .progress-container { height: 80px; background: #000; border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.2); display: flex; overflow: hidden;}
        .bar-a { background: linear-gradient(90deg, #900, var(--accent-red)); transition: width 1.2s cubic-bezier(0.34, 1.56, 0.64, 1); display: flex; align-items: center; justify-content: center; overflow: visible; }
        .bar-b { background: linear-gradient(90deg, var(--accent-blue), #002244); transition: width 1.2s cubic-bezier(0.34, 1.56, 0.64, 1); display: flex; align-items: center; justify-content: center; overflow: visible; }
        .percent-text { font-weight: 900; font-size: 2.2rem; color: #fff; text-shadow: 0 3px 10px rgba(0,0,0,0.9); position: relative; }
        .vs-label { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); color: #fff; font-weight: 900; font-size: 18px; z-index: 10; background: #000; padding: 5px 15px; border-radius: 20px; border: 2px solid #444;}

        .btn-premium { border-radius: 22px; font-weight: 900; font-size: 16px; letter-spacing: 2px; transition: 0.3s; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); position: relative;}
        .btn-a-red { background: linear-gradient(145deg, #500, #200); color: #ffb3b3; }
        .btn-a-red:hover:not(:disabled) { background: var(--accent-red); color: #fff; box-shadow: 0 0 40px rgba(255, 45, 85, 0.6); transform: translateY(-3px); }
        .btn-b-blue { background: linear-gradient(145deg, #002866, #001133); color: #b3d1ff; }
        .btn-b-blue:hover:not(:disabled) { background: var(--accent-blue); color: #fff; box-shadow: 0 0 40px rgba(0, 122, 255, 0.6); transform: translateY(-3px); }
        
        .btn-locked { opacity: 0.4; cursor: not-allowed; filter: grayscale(0.8); border: 1px solid #555; }
        .btn-voted-active { opacity: 1 !important; border-color: var(--gold-light); box-shadow: inset 0 0 30px rgba(212,175,55,0.6); filter: none !important; color: #fff; }

        .rule-box { background: rgba(255, 255, 255, 0.1); border: 1px dashed rgba(212, 175, 55, 0.4); padding: 25px; border-radius: 24px; margin-top: 35px; }
        .rule-item { color: #f1f5f9; font-weight: 500; line-height: 1.8; font-size: 15px; }

        /* 彈窗樣式 */
        #voteModal { display: none; position: fixed; inset: 0; z-index: 10000; background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(10px); align-items: center; justify-content: center; padding: 24px; opacity: 0; transition: opacity 0.3s ease; }
        #voteModal.show { display: flex; opacity: 1; }
        .modal-content { background: #111; border: 2px solid var(--gold-primary); border-radius: 30px; padding: 40px 30px; max-width: 400px; width: 100%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.8); }
    </style>
</head>
<body>

    <div class="main-card">
        <header class="text-center">
            <h1 class="title-prestige">VIP 專屬抽獎池</h1>
            
            <div id="event-time-display" class="event-time">載入時間中...</div>
            
            <div class="user-profile-card inline-flex mx-auto">
                <div class="text-center">
                    <p class="text-xs text-gray-300 uppercase tracking-widest mb-2">Account Info</p>
                    <div class="flex items-center justify-center gap-3">
                        <span id="user-name" class="font-bold text-lg">讀取中...</span>
                        <span class="text-gray-500">|</span>
                        <span class="text-sm font-bold text-gray-300">Level</span>
                        <span id="user-level" class="level-badge">--</span>
                    </div>
                    <div id="user-status" class="status-badge status-loading">驗證中...</div>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-2 gap-8 mb-6">
            <div class="text-center">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Nintendo_Switch_Console.png/640px-Nintendo_Switch_Console.png" class="h-28 mx-auto mb-3 object-contain" alt="Switch">
                <p class="text-[12px] text-gray-300 font-bold uppercase tracking-widest">Team Switch</p>
            </div>
            <div class="text-center">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/1b/PlayStation_5_and_DualSense_with_transparent_background.png/640px-PlayStation_5_and_DualSense_with_transparent_background.png" class="h-28 mx-auto mb-3 object-contain" alt="PS5">
                <p class="text-[12px] text-gray-300 font-bold uppercase tracking-widest">Team PS5</p>
            </div>
        </div>

        <div class="progress-wrapper">
            <div class="progress-container mb-4">
                <div id="bar-a" class="bar-a" style="width: 50%"><span id="percent-a" class="percent-text">50%</span></div>
                <div id="bar-b" class="bar-b" style="width: 50%"><span id="percent-b" class="percent-text">50%</span></div>
                <div class="vs-label">VS</div>
            </div>
            <div class="flex justify-between px-3 text-[13px] font-black text-gray-200 tracking-widest uppercase">
                <span id="count-a">-- 人已投票</span>
                <span id="count-b">-- 人已投票</span>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-5">
            <button id="btn-vote-a" onclick="openVoteModal('A')" class="btn-premium btn-a-red py-5 btn-locked" disabled>選擇 Switch</button>
            <button id="btn-vote-b" onclick="openVoteModal('B')" class="btn-premium btn-b-blue py-5 btn-locked" disabled>選擇 PS5</button>
        </div>

        <div class="rule-box">
            <h3 class="text-xs font-bold text-[#fff3cd] tracking-[0.2em] uppercase mb-4">活動規則</h3>
            <ul class="space-y-3 rule-item">
                <li>1. 參與活動時，請先選擇欲參加之獎池，並完成投票。</li>
                <li><strong class="text-[#ff2d55]">2. 每個帳號限投票一次，投票後即無法更改。</strong></li>
                <li>3. 僅開放 VIP 20 等（含）以上用戶參與。</li>
                <li>4. 最終結算將以 Google 伺服器時間為準。</li>
            </ul>
        </div>
    </div>

    <div id="voteModal">
        <div class="modal-content">
            <h2 class="text-2xl font-black text-[#fff3cd] mb-4">確認投票？</h2>
            <p class="text-base text-gray-200 mb-8 leading-relaxed font-bold">一旦送出後，<span class="text-[#ff2d55]">絕對無法更改選項</span><br>請確認您的選擇！</p>
            <div class="flex justify-center gap-4">
                <button onclick="closeModal()" class="px-8 py-3 text-gray-400 font-bold hover:text-white transition-colors text-lg">再想想</button>
                <button id="confirm-btn" onclick="submitVote()" class="px-10 py-3 bg-[#d4af37] text-black font-black rounded-xl hover:bg-[#fff3cd] transition-colors text-lg shadow-lg">確認送出</button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. 活動時間設定 (請在此修改)
        // ==========================================
        const EVENT_CONFIG = {
            start: new Date('2026-03-15T00:00:00+08:00'), // 活動開始
            end:   new Date('2026-03-20T23:59:59+08:00'), // 活動結束
            displayStr: '活動期間：3/15 00:00 - 3/20 23:59'
        };

        // ==========================================
        // 2. API 設定
        // ==========================================
        const CFG = {
            userInfoApi: 'https://swag-user-info-api-905468082258.asia-east1.run.app/api/badges',
            // TODO: 請填入您發布的 Google Apps Script 網址
            googleSheetApi: 'YOUR_GOOGLE_APPS_SCRIPT_URL' 
        };

        let state = {
            uid: null, token: null, username: '---', level: 0,
            hasVoted: false, votedChoice: null, isEventActive: false,
            baseA: 3420, baseB: 1580 
        };
        let selectedChoice = null;

        // 初始化
        async function initApp() {
            document.getElementById('event-time-display').innerText = EVENT_CONFIG.displayStr;
            checkEventTime();

            const urlParams = new URLSearchParams(window.location.search);
            state.uid = urlParams.get('user_id') || urlParams.get('uid');
            state.token = urlParams.get('token'); // 預留防冒用機制

            if(!state.uid) {
                document.getElementById('user-name').innerText = "未登入帳號";
                renderStatus('ineligible', '請從正確連結進入');
                updateChart();
                return;
            }

            try {
                // 1. 取得使用者基本資料
                const res = await fetch(`${CFG.userInfoApi}?user_id=${state.uid}`).then(r => r.json());
                state.username = res.username || "User_" + state.uid.substring(0, 4);
                state.level = res.level || 0;
                
                document.getElementById('user-name').innerText = state.username;
                document.getElementById('user-level').innerText = state.level;

                // 2. 減少 API 負擔：先查 LocalStorage
                const localVote = localStorage.getItem(`vip_vote_${state.uid}`);
                if (localVote) {
                    state.hasVoted = true;
                    state.votedChoice = localVote;
                } else if (CFG.googleSheetApi !== 'YOUR_GOOGLE_APPS_SCRIPT_URL') {
                    // 3. LocalStorage 沒有，再跟 Google Sheet 確認是否投過
                    const sheetRes = await fetch(`${CFG.googleSheetApi}?user_id=${state.uid}`).then(r => r.json());
                    if (sheetRes.voted) {
                        state.hasVoted = true;
                        state.votedChoice = sheetRes.choice;
                        localStorage.setItem(`vip_vote_${state.uid}`, sheetRes.choice); // 補回快取
                    }
                }
            } catch (error) {
                console.error("Data Load Error", error);
            }

            updateUI();
        }

        function checkEventTime() {
            const now = new Date();
            if (now < EVENT_CONFIG.start) {
                state.isEventActive = false;
                renderStatus('ineligible', '活動尚未開始');
            } else if (now > EVENT_CONFIG.end) {
                state.isEventActive = false;
                renderStatus('ineligible', '活動已結束');
            } else {
                state.isEventActive = true;
            }
        }

        function renderStatus(type, forceText = null) {
            const statusEl = document.getElementById('user-status');
            statusEl.className = 'status-badge ' + `status-${type}`;
            if(forceText) {
                statusEl.innerText = forceText;
            } else {
                if(type === 'voted') statusEl.innerText = '👑 已完成投票';
                if(type === 'eligible') statusEl.innerText = '✅ 符合抽獎資格';
                if(type === 'ineligible') statusEl.innerText = '❌ 資格不符 (需 LV.20)';
            }
        }

        function updateUI() {
            checkEventTime();
            const btnA = document.getElementById('btn-vote-a');
            const btnB = document.getElementById('btn-vote-b');

            if (state.hasVoted) {
                renderStatus('voted');
                btnA.disabled = btnB.disabled = true;
                btnA.className = btnB.className = "btn-premium py-5 btn-locked";
                if(state.votedChoice === 'A') btnA.classList.add('btn-a-red', 'btn-voted-active');
                else btnB.classList.add('btn-b-blue', 'btn-voted-active');
            } else if (!state.isEventActive) {
                btnA.disabled = btnB.disabled = true;
            } else if (state.level >= 20) {
                renderStatus('eligible');
                btnA.disabled = btnB.disabled = false;
                btnA.classList.remove('btn-locked'); btnB.classList.remove('btn-locked');
            } else {
                renderStatus('ineligible');
                btnA.disabled = btnB.disabled = true;
            }
            updateChart();
        }

        function updateChart() {
            let currentA = state.baseA + (state.votedChoice === 'A' ? 1 : 0);
            let currentB = state.baseB + (state.votedChoice === 'B' ? 1 : 0);
            let total = currentA + currentB;
            
            let pA = Math.round((currentA / total) * 100) || 50;
            let pB = 100 - pA;

            document.getElementById('bar-a').style.width = pA + '%';
            document.getElementById('bar-b').style.width = pB + '%';
            document.getElementById('percent-a').innerText = pA + '%';
            document.getElementById('percent-b').innerText = pB + '%';
            document.getElementById('count-a').innerText = `${currentA.toLocaleString()} 人已投票`;
            document.getElementById('count-b').innerText = `${currentB.toLocaleString()} 人已投票`;
        }

        function openVoteModal(choice) {
            checkEventTime();
            if (!state.isEventActive) return alert("非活動開放時間！");
            if (state.level < 20) return alert("等級不足！");
            if (state.hasVoted) return;

            selectedChoice = choice;
            const modal = document.getElementById('voteModal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('show'), 10);
        }

        function closeModal() { 
            const modal = document.getElementById('voteModal');
            modal.classList.remove('show');
            setTimeout(() => modal.style.display = 'none', 300);
        }

        async function submitVote() {
            const btn = document.getElementById('confirm-btn');
            btn.innerText = "處理中...";
            btn.disabled = true;

            // 如果有設定 Google API 則寫入
            if (CFG.googleSheetApi !== 'https://script.google.com/a/macros/swag.live/s/AKfycbzkobyCUYgxWCWR57bAOKUeE9XAOBixppm3ZNVLyvoRjIIQzunLFEH3Tg2J6LrmJIaE/exec') {
                try {
                    const res = await fetch(CFG.googleSheetApi, {
                        method: 'POST',
                        body: JSON.stringify({
                            user_id: state.uid,
                            username: state.username,
                            choice: selectedChoice,
                            token: state.token // 防冒用驗證
                        })
                    }).then(r => r.json());

                    if (res.success === false) {
                        alert(res.message === "Already voted" ? "您已經投過票了！" : "系統錯誤");
                        closeModal();
                        return;
                    }
                } catch (e) {
                    alert("網路錯誤，請稍後再試");
                    btn.innerText = "確認送出"; btn.disabled = false;
                    return;
                }
            }

            // 成功後寫入前端快取
            localStorage.setItem(`vip_vote_${state.uid}`, selectedChoice);
            state.hasVoted = true;
            state.votedChoice = selectedChoice;
            
            closeModal();
            updateUI(); 
            setTimeout(() => alert('投票成功！感謝您的參與。'), 350);
        }

        window.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
